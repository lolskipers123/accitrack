services:
  - type: web
    name: accitrack
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PI_API_KEY
        sync: false  # set this manually in the Render dashboard; must match
                     # UPLOAD_API_KEY in detect_and_stream.py on the Pi
