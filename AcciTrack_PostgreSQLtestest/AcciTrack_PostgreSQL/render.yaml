services:
  - type: web
    name: accitrack
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: accitrack-db
          property: connectionString

databases:
  - name: accitrack-db
    plan: free
