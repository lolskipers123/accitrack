services:
  - type: web
    name: accitrack
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TZ
        value: Asia/Manila
        # Without this, Render's container runs in UTC and every
        # datetime.datetime.now() call in main.py (report timestamps,
        # case numbers, session timeouts, etc.) is silently 8 hours
        # behind actual Philippines time. Setting TZ makes Python's
        # naive datetime.now() calls resolve to local Manila time
        # automatically, with no code changes needed at any call site.
      - key: PI_API_KEY
        sync: false  # set this manually in the Render dashboard; must match
                     # UPLOAD_API_KEY in detect_and_stream.py on the Pi
